name: Publish daemon

# Publishes the @atul1104/flotilla daemon CLI to the public npm registry.
# Triggered by a tag named `daemon-v<version>` (e.g. `daemon-v0.1.0`), so the
# daemon can be versioned and shipped independently of the web/api app.
#
# Prereq: an npm automation token in the repo secret `NPM_PUBLISH_TOKEN` that
# has publish rights on the @atul1104 scope. The token must be allowed to
# publish @atul1104/flotilla (access: public — set in package.json
# publishConfig, so no org-paid-private-plan required).

on:
  push:
    tags:
      - 'daemon-v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci

      # Sanity: the tag version must match the package version. Prevents
      # pushing a tag like daemon-v0.2.0 while package.json still says 0.1.0.
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#daemon-v}"
          PKG=$(node -p "require('./packages/daemon/package.json').version")
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag version ($TAG) does not match package.json ($PKG)" >&2
            exit 1
          fi

      - name: Publish
        run: npm publish --workspace @atul1104/flotilla
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
