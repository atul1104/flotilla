# Railway deployment config for the Flotilla API service.
# Version-controlled so build/start/release commands track the repo (scope renames
# etc. update here via git, not silently in the dashboard). See DEPLOY.md for the
# full deployment guide.
#
# Valid [build] fields: builder (RAILPACK|DOCKERFILE), watchPatterns, buildCommand,
#   dockerfilePath, railpackVersion.
# Valid [deploy] fields: startCommand, preDeployCommand (array), healthcheckPath,
#   healthcheckTimeout, restartPolicyType, restartPolicyMaxRetries, cronSchedule, ...

# Build all workspaces — the API serves apps/web/dist in prod, so web must build too.
# Root `npm run build` runs `npm run build --workspaces --if-present`.
[build]
buildCommand = "npm run build"

[deploy]
# Root `npm start` → node apps/api/src/server.js (reads PORT from the env).
startCommand = "npm start"
# Run Prisma migrations before the app boots. Root script targets @atul1104/api.
# preDeployCommand is an ARRAY.
preDeployCommand = ["npm run db:migrate:deploy"]
# Health endpoint per DEPLOY.md — returns 200 {status: ok}, 503 on DB failure.
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
