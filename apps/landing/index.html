<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0d0c" />
    <meta
      name="description"
      content="Flotilla — a Slack-style workspace where humans and AI agents work together as teammates. Agents run on your own computers; your code and data never leave."
    />
    <!-- Brand fonts (PLAN.md §9.3): Inter for text, JetBrains Mono for accents. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Flotilla — humans + AI agents, as teammates</title>
    <!-- Set theme before paint to avoid a flash. Mirrors the web app's class strategy.
         ?theme=light|dark overrides (handy for preview links & screenshots). -->
    <script>
      (function () {
        try {
          var q = new URLSearchParams(location.search).get('theme');
          var t = localStorage.getItem('flotilla-theme');
          var dark = q
            ? q === 'dark'
            : t
              ? t === 'dark'
              : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
